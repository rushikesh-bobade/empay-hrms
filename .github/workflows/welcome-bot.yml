name: "Welcome Bot"

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Welcome New Contributor
        uses: actions/github-script@v9
        with:
          script: |
            const creator = context.payload.sender.login;
            
            // Ignore if the creator is the repository owner
            if (creator === context.repo.owner) return;
            
            if (context.eventName === 'issues') {
              const issueComment = `👋 Hi @${creator}! Welcome to **EmPay HRMS**!\n\nThank you for opening this issue. If you are participating in GSSoC '26, please make sure you wait to be officially assigned by a maintainer before you start working on it.\n\nAlso, if you haven't already, please **⭐ Star this repository** to show your support! A maintainer will review your issue shortly.`;
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: issueComment
              });
            } else if (context.eventName === 'pull_request_target') {
              const prComment = `🎉 Hey @${creator}! Thank you so much for submitting this Pull Request to **EmPay HRMS**!\n\nOur automated CI checks are running now. A reviewer will review your code as soon as possible. Please wait for their review before making further changes.\n\nIf you love this project, please don't forget to **⭐ Star the repository**!`;
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: prComment
              });
            }
