name: "Congratulate on Merge"

on:
  pull_request_target:
    types: [closed]

jobs:
  congratulate:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Congratulate Contributor
        uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.pull_request.user.login;
            
            const emojis = ['🎉', '🚀', '🥳', '🙌', '⭐', '🏆', '🔥'];
            const emoji = emojis[Math.floor(Math.random() * emojis.length)];
            
            const commentBody = `${emoji} **Congratulations @${creator}!** \n\nYour Pull Request has been successfully reviewed and **merged** into the \`main\` branch! \n\nThank you so much for your hard work, time, and dedication to improving **EmPay HRMS**. We deeply appreciate your contribution to this open-source project and hope you'll stick around to tackle more issues!\n\nHappy coding! 💻✨`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });
