name: "Congratulate on Merge"

on:
  pull_request_target:
    types: [closed]

jobs:
  congratulate:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Congratulate Contributor
        uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.pull_request.user.login;
            
            const emojis = ['🎉', '🚀', '🥳', '🙌', '⭐'];
            const emoji = emojis[Math.floor(Math.random() * emojis.length)];
            
            const commentBody = `${emoji} **Merged!** Thanks for the great contribution, @${creator}! Your PR is now part of the \`main\` branch. We'd love to see you tackle another issue soon!`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });
