name: "AI PR Reviewer (Groq)"

on:
  pull_request_target:
    types: [opened, synchronize]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Run Groq AI Review
        uses: actions/github-script@v9
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        with:
          script: |
            const apiKey = process.env.GROQ_API_KEY;
            if (!apiKey) {
              core.setFailed("🚨 No GROQ_API_KEY provided in secrets! The bot cannot run without it.");
              return;
            }
            
            console.log("Fetching diff via GitHub API...");
            const diffResponse = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              mediaType: { format: "diff" }
            });
            const diff = diffResponse.data;
            
            // If there's no diff or if it's way too large to process, skip it safely
            if (!diff || typeof diff !== 'string' || !diff.trim()) return console.log("No diff found.");
            if (diff.length > 20000) return console.log("Diff too large for AI review.");
            
            const prompt = `You are an advanced AI Code Reviewer. Review the following Pull Request diff and provide a comprehensive, beautifully formatted Markdown response EXACTLY matching this structure:

            <details>
            <summary>ℹ️ Review Info</summary>
            **Reviewer**: Groq Llama3-70B
            </details>

            ---

            <!-- walkthrough_start -->
            <details>
            <summary>📝 Walkthrough</summary>

            ## Walkthrough
            [Provide a high-level summary of the changes in 2-3 sentences]

            ## Changes
            | Cohort / File(s) | Summary |
            |---|---|
            | **[Category Name]** <br> \\\`[filename]\\\` | [Brief description of what changed] |

            ## Sequence Diagram(s)
            [If applicable, provide a simple Mermaid sequence diagram summarizing the flow change. If not, omit this section.]
            \\\`\\\`\\\`mermaid
            sequenceDiagram
              [diagram here]
            \\\`\\\`\\\`

            ## Estimated code review effort
            🎯 [1-5 Scale] | ⏱️ ~[X] minutes

            ## Poem
            > 🐰 [Write a cute, 4-line rhyming poem about the code changes] 🥕

            </details>
            <!-- walkthrough_end -->

            <details>
            <summary>🚥 Feedback & Issues</summary>

            ### ❌ Bugs & Warnings
            [List any actual bugs, logic errors, or security vulnerabilities here using bullet points. If none, write "✅ Passed checks: No major issues found."]

            ### ✨ Suggestions
            [Suggest performance improvements or best practices]

            </details>

            Here is the Git Diff to review:
            \n\n${diff}`;
            
            console.log("Sending diff to Groq API...");
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
              method: "POST",
              headers: {
                "Authorization": `Bearer ${apiKey}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                model: "llama3-70b-8192", // Using Llama 3 70B for high-quality logic reasoning
                messages: [{ role: "user", content: prompt }],
                temperature: 0.1
              })
            });
            
            const data = await response.json();
            
            if (data.error) {
              console.error("Groq API Error:", data.error);
              return;
            }
            
            const reviewComment = data.choices[0].message.content;
            const finalBody = `🤖 **Groq AI Code Review**\n\n${reviewComment}\n\n*Note: I am an AI reviewer. My suggestions should be taken as advice, not strict demands!*`;
            
            // Post the review as a comment on the PR
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: finalBody
            });
